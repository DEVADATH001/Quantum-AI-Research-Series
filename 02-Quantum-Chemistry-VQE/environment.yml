name: quantum-chemistry-vqe
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    # Scientific computing
    - numpy>=1.26,<3.0
    - scipy>=1.12,<2.0
    - matplotlib>=3.8,<4.0
    - pyyaml>=6.0,<7.0
    # Qiskit ecosystem (pinned for compatibility)
    - qiskit==1.1.2
    - qiskit-nature==0.7.2
    - qiskit-algorithms==0.3.0
    - qiskit-aer==0.14.2        # Noisy simulation
    - qiskit-ibm-runtime==0.22.0  # IBM hardware bridge (optional)
    # Chemistry backend (required for research-grade runs)
    - pyscf>=2.3,<3.0
    # Data & testing
    - pandas>=2.0,<3.0
    - pytest>=7.0,<9.0
    - pytest-cov>=4.0
    - black>=24.0
    - ruff>=0.4.0