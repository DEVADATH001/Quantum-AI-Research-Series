# Experiment Configuration for Quantum Kernel SVM on MNIST
# ==========================================================
# Author: DEVADATH H K
# Research grade configuration — all parameters are intentionally chosen
# and documented with the scientific rationale.

# Dataset Configuration
dataset:
  name: "MNIST"
  digits: [4, 9]  # Binary classification: digit 4 vs 9 (most visually similar pair)
  test_size: 0.25
  random_state: 42
  stratify: true
  # IMPORTANT: Leave false on machines with internet access so the experiment
  # runs on real MNIST (70 000 samples, 28x28 pixels) from OpenML.
  # Set true only for offline/CI environments; the fallback uses sklearn's
  # 8x8 toy digits which are NOT comparable to MNIST results.
  fallback_to_sklearn_digits: false

# Preprocessing Configuration
preprocessing:
  normalize: true
  standardize: true
  pca:
    n_components: 8
    variance_threshold: 0.95
    random_state: 42
  # Scale features to [0, pi/2] for angle encoding.
  # Using pi/2 (half-turn) instead of pi prevents Bloch-sphere over-dispersion
  # which causes exponential concentration / mode collapse in ZZ kernels.
  # See: Thanasilp et al. (2022) "Exponential concentration in quantum kernel methods"
  quantum_scaling: true
  feature_range: "pi/2"

# Classical Model Configuration
classical_model:
  kernel: "rbf"
  grid_search:
    enabled: true
    cv: 3
    scoring: "accuracy"
    param_grid:
      C: [0.1, 1, 10, 100]
      gamma: ["scale", "auto", 0.1, 0.01]
    n_jobs: 1
  random_state: 42

# Quantum Feature Map Configuration
# reps=1 is intentional: higher reps drastically increase circuit depth and
# gate count without improving performance on <=8 qubits for statevector sims.
# entanglement="full" gives maximum pairwise interaction at low cost for
# small feature dimensions.
quantum_feature_map:
  type: "ZZFeatureMap"
  feature_dimension: 8
  reps: 1
  entanglement: "full"
  parameter_prefix: "x"

# Quantum Kernel Configuration
quantum_kernel:
  type: "FidelityQuantumKernel"
  sampler: "SamplerV2"
  # null = statevector (exact); set an integer for shot-based sampling
  shots: null
  cache: true

# Exact QSVC Configuration
qsvc:
  C: 1.0
  random_state: 42
  grid_search: true
  cv: 3
  n_jobs: 1

# Pegasos QSVC Configuration
# lambda_param=0.001 → effectively large C → allows model to learn the decision
# boundary. The default lambda=1.0 causes over-regularisation on small datasets
# and leads to predicting the majority class for all samples (model collapse).
# max_iter=1500 gives better convergence; batch_size=32 is more stable for n<200.
# Reference: Shalev-Shwartz et al. (2011) "Pegasos: Primal estimated sub-gradient
# solver for SVM", Mathematical Programming, 127(1), 3-30.
pegasos_svc:
  lambda_param: 0.001
  max_iter: 1500
  batch_size: 32
  random_state: 42

# Noise Simulation Configuration
noise_simulation:
  enabled: true
  backend: "ibm_brisbane"
  noise_model:
    readout_error: 0.01
    gate_error: 0.001   # Matches realistic IBM Brisbane T1/T2 specs
  shots: 4096
  method: "density_matrix"

# Evaluation Configuration
evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - kta          # Kernel-Target Alignment — added for publication
  confusion_matrix: true
  save_results: true
  results_dir: "results"

# Visualization Configuration
visualization:
  figures:
    pca_scatter: true
    pca_variance: true
    class_distribution: true
    kernel_heatmap: true
    metrics_comparison: true
    confusion_matrix: true
    depth_ablation: true   # reps vs accuracy/KTA — novel contribution
  save_format: "png"
  dpi: 150
  style: "seaborn-v0_8-darkgrid"

# Ablation Study Configuration
# Multi-seed ensures statistical robustness; 3 seeds give n=3 for paired t-test.
# pca_dimensions covers the practical NISQ qubit range (4-8 qubits).
# reps_values drives the novel feature-map depth ablation contribution.
ablation:
  seeds: [42]
  pca_dimensions: [4]
  reps_values: [1, 2]        # Feature-map depth ablation
  max_quantum_train: 20         # Per-quantum-run training cap (more = better stats)
  max_kernel_samples: 20        # Kernel diagnostic matrix size
  max_noise_samples: 10          # Noise run sample cap (keep tractable)

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "experiment.log"

# Quantum Kernel Learning (Optional)
quantum_kernel_learning:
  enabled: false
  lr: 0.05
  n_epochs: 30
  batch_size: 20

# Reproducibility
random_seed: 42

# Hardware Deployment Configuration
# Set use_real_hardware: true and export IBM_QUANTUM_TOKEN=<token> to run on
# a real IBM Quantum backend.  All other settings remain unchanged; the
# HardwareBackendManager in src/hardware_backend.py handles the swap.
hardware:
  use_real_hardware: false
  backend_name: "ibm_brisbane"
  shots: 4096
  ibm_token: null   # override via env var IBM_QUANTUM_TOKEN
