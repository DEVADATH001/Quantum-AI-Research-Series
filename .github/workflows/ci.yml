name: CI — Smoke Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30          # hard cap on the whole job

    strategy:
      fail-fast: false           # let both matrix jobs report independently
      matrix:
        python-version: ["3.10", "3.11"]

    env:
      MPLBACKEND: Agg            # non-interactive backend — prevents Tkinter crashes
      PYTHONUNBUFFERED: "1"      # flush output immediately so logs are readable

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-pip-

      - name: Install CI dependencies
        # requirements-ci.txt is the lean install:
        #   - excludes pyscf (requires a C compiler, 5+ min build time)
        #   - excludes jupyter/notebook (not needed for smoke tests)
        #   - includes everything else the five modules actually use
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run smoke tests (CI mode)
        # $CI=true is set automatically by GitHub Actions, so smoke_all.py
        # auto-selects CI mode (fast Iris grid, 300 s per-module timeout).
        # Module 02 uses a synthetic fallback when pyscf is absent — it prints
        # a warning but still exits 0.
        run: python scripts/smoke_all.py
