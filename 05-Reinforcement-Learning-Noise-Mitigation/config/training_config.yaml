seed: 42

environment:
  n_states: 2
  n_actions: 2
  max_episode_steps: 20
  correct_reward: 1.0
  incorrect_penalty: -0.1

quantum_policy:
  num_qubits: 2
  reps: 2
  entanglement: full
  ansatz: RealAmplitudes
  temperature: 1.0

training:
  n_episodes: 250
  gamma: 0.99
  learning_rate: 0.05
  normalize_returns: true
  shift: 1.5707963267948966
  log_every: 10
  entropy_coeff: 0.01
  grad_clip: 1.0

quantum_execution:
  shots: 1024
  optimization_level: 1
  backend_name: ibm_osaka
  resilience_level: 2

mitigation:
  enabled: true
  method: both
  zne:
    scale_factors: [1.0, 1.5, 2.0, 2.5, 3.0]
    extrapolation: linear
    degree: 1

evaluation:
  convergence_threshold: 0.8
  moving_avg_window: 10

results:
  output_dir: results
  log_level: INFO

